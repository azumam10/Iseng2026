version: '3.8'

# ============================================================
# Docker Compose - Pemweb Stack
# Services: nginx, php-fpm, mariadb
# ============================================================

networks:
  pemweb_network:
    driver: bridge

volumes:
  db_data:
    driver: local
  nginx_logs:
    driver: local

services:

  # ----------------------------------------------------------
  # PHP-FPM Application Server
  # ----------------------------------------------------------
  pemweb:
    build:
      context: ./php
      dockerfile: Dockerfile
    image: pemweb_php:${IMAGE_TAG:-latest}
    container_name: pemweb_php
    hostname: pemweb
    restart: unless-stopped
    environment:
      - TZ=Asia/Jakarta
      - XDEBUG=${XDEBUG:-false}
      - REMOTE_HOST=${REMOTE_HOST:-host.docker.internal}
      - PHP_IDE_CONFIG=${PHP_IDE_CONFIG:-}
      # DB connection info for entrypoint health check
      - DB_HOST=db_pemweb
      - DB_PORT=3306
      - DB_DATABASE=${MYSQL_DATABASE:-pemweb_db}
      - DB_USERNAME=${MYSQL_USER:-pemweb_user}
      - DB_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - ./src:/var/www/html
      - ./php/www.conf:/usr/local/etc/php-fpm.d/www.conf:ro
    working_dir: /var/www/html
    networks:
      - pemweb_network
    depends_on:
      db_pemweb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ----------------------------------------------------------
  # MariaDB Database
  # ----------------------------------------------------------
  db_pemweb:
    image: mariadb:10.11
    container_name: db_pemweb
    restart: unless-stopped
    tty: true
    ports:
      - "${DB_PORT:-13306}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/conf.d:/etc/mysql/conf.d:ro
      - ./db/init:/docker-entrypoint-initdb.d:ro
    environment:
      MYSQL_USER: ${MYSQL_USER:-pemweb_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-pemweb_db}
      TZ: Asia/Jakarta
    networks:
      - pemweb_network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ----------------------------------------------------------
  # Nginx Web Server
  # ----------------------------------------------------------
  nginx_pemweb:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    image: nginx_pemweb:${IMAGE_TAG:-latest}
    container_name: nginx_pemweb
    hostname: nginx_pemweb
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./src:/var/www/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_logs:/var/log/nginx
    networks:
      - pemweb_network
    depends_on:
      pemweb:
        condition: service_healthy