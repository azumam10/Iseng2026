[www]

user = www-data
group = www-data

; Listen on the correct PHP-FPM container hostname (matches compose service name)
listen = 0.0.0.0:9000

; Process manager: dynamic untuk efisiensi resource
pm = dynamic
pm.max_children = 50
pm.start_servers = 5
pm.min_spare_servers = 5
pm.max_spare_servers = 15
pm.max_requests = 500

; Timeout settings
request_terminate_timeout = 120s
request_slowlog_timeout = 5s
slowlog = /var/log/php-fpm-slow.log

; Status pages (untuk monitoring)
pm.status_path = /fpm-status
ping.path = /fpm-ping
ping.response = pong

; Catch worker output
catch_workers_output = yes

; Clear env for security
clear_env = no

; Limit extensions for security
security.limit_extensions = .php .phtml